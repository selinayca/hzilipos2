##############################################################################
# NGINX – HizliPOS Reverse Proxy
#
# Routing:
#   api.example.com         →  backend:3001
#   app.example.com         →  backoffice:3002
#   *.example.com           →  pos-web:3000  (tenant subdomains)
#
# TLS: certbot-managed certificates in /etc/letsencrypt
##############################################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────────────
  log_format main '$remote_addr - $host [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main buffer=16k;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_comp_level    4;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/x-font-ttf image/svg+xml;

  # ── Security headers (applied to all vhosts) ─────────────────────────
  add_header X-Frame-Options          SAMEORIGIN;
  add_header X-Content-Type-Options   nosniff;
  add_header Referrer-Policy          strict-origin-when-cross-origin;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()";

  # ── Rate limiting zones ────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m       rate=10r/m;

  # ── Upstream definitions ───────────────────────────────────────────────
  upstream backend_upstream {
    server backend:3001;
    keepalive 32;
  }

  upstream pos_upstream {
    server pos-web:3000;
    keepalive 16;
  }

  upstream backoffice_upstream {
    server backoffice:3002;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── API (api.example.com) ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # Auth endpoints: stricter rate limit
    location ~ ^/api/v1/auth/(login|refresh|register-tenant)$ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=api_global burst=20 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }

  # ── Backoffice (app.example.com) ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;";

    location / {
      proxy_pass         http://backoffice_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ── POS (*.example.com — tenant subdomains) ───────────────────────────
  server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>[a-z0-9][a-z0-9-]+)\.example\.com$;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # Service worker must be served with correct headers
    location /sw.js {
      proxy_pass         http://pos_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      add_header         Cache-Control "no-cache, no-store";
      add_header         Service-Worker-Allowed "/";
    }

    location / {
      proxy_pass         http://pos_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Forwarded-Host $host;
    }
  }
}
