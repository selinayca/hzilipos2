##############################################################################
# HizliPOS – Production Docker Compose (Phase 1 / Single VPS)
#
# All secrets should be provided via .env file or environment variables.
# Do NOT commit .env to version control.
#
# Start:  docker compose up -d
# Logs:   docker compose logs -f
# Stop:   docker compose down
##############################################################################

version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hizlipos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hizlipos_dev}
      POSTGRES_USER: ${DB_USER:-hizlipos}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Only bind to localhost — NGINX/app access via network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hizlipos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hizlipos_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-} --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (NestJS) ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: hizlipos_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-hizlipos}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-hizlipos_dev}
      DB_SYNC: "false"
      DB_LOGGING: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      APP_DOMAIN: ${APP_DOMAIN:-example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - public

  # ── POS Web (Next.js) ────────────────────────────────────────────────────
  pos-web:
    build:
      context: .
      dockerfile: apps/pos-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${APP_DOMAIN:-example.com}
        NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-example.com}
    container_name: hizlipos_pos
    restart: unless-stopped
    environment:
      PORT: 3000
    depends_on:
      - backend
    networks:
      - internal
      - public

  # ── Backoffice (Next.js) ─────────────────────────────────────────────────
  backoffice:
    build:
      context: .
      dockerfile: apps/backoffice/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${APP_DOMAIN:-example.com}
    container_name: hizlipos_backoffice
    restart: unless-stopped
    environment:
      PORT: 3002
    depends_on:
      - backend
    networks:
      - internal
      - public

  # ── NGINX (reverse proxy) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: hizlipos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - pos-web
      - backoffice
    networks:
      - public

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
    internal: true   # postgres & redis not reachable from outside docker
  public:
    driver: bridge
