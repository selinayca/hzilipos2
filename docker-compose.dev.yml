##############################################################################
# HizliPOS – Development Docker Compose
#
# Starts only infrastructure (postgres + redis).
# Run apps locally with:  pnpm dev
#
# Start: docker compose -f docker-compose.dev.yml up -d
##############################################################################

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hizlipos_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: hizlipos_dev
      POSTGRES_USER: hizlipos
      POSTGRES_PASSWORD: hizlipos_secret
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hizlipos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hizlipos_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
